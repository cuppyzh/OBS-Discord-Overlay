<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Discord Overlay — Foreground Layer (generated)</title>
<!--
  GENERATED FILE — generated by generate.ps1 from config.json.
  Do not edit by hand; edit config.json / templates and re-run the generator.

  Add this file as an OBS Browser Source (Local file), width/height equal
  to the canvas in config.json, placed ABOVE the StreamKit browser source.

  Draws the slot border, player name (bottom center) and role badge
  (top left) on top of the avatars. Static HTML + CSS only, no JavaScript.
-->
<style>
  html, body {
    margin: 0;
    width: {{CANVAS_W}}px;
    height: {{CANVAS_H}}px;
    background: transparent;
    overflow: hidden;
    font-family: {{NAME_FONT}};
  }
  .slot {
    position: absolute;
    box-sizing: border-box;
    width: {{SLOT_SIZE}}px;
    height: {{SLOT_SIZE}}px;
    /* transparent border keeps name/role geometry identical to the visible
       frame, which is drawn by the layers below (bg offline, avatar online)
       so the talking state can recolor it */
    border: {{BORDER_WIDTH}}px solid transparent;
    border-radius: {{BORDER_RADIUS}}px;
  }
  .name {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    max-width: calc(100% - 10px);
    box-sizing: border-box;
    padding: 2px 10px;
    border-radius: 8px;
    background: {{NAME_BG}};
    color: {{NAME_COLOR}};
    font-weight: 700;
    font-size: {{NAME_FONT_SIZE}}px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }
  .role {
    position: absolute;
    top: 0;
    left: 0;
    padding: 2px 9px;
    border-radius: {{ROLE_RADIUS}}px 0 8px 0;
    background: {{ROLE_BG}};
    color: {{ROLE_COLOR}};
    font-weight: 600;
    font-size: {{ROLE_FONT_SIZE}}px;
    white-space: nowrap;
  }
  .role:empty { display: none; }
</style>
</head>
<body>
{{#USERS}}
  <!-- slot {{SLOT_INDEX}}: {{DISPLAY_NAME}} -->
  <div class="slot" style="left: {{SLOT_X}}px; top: {{SLOT_Y}}px;">
    <div class="role">{{ROLE_NAME}}</div>
    <div class="name">{{DISPLAY_NAME}}</div>
  </div>
{{/USERS}}
</body>
</html>
